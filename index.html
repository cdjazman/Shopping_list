<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Shopping List</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C1622D">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shopping List">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;700&display=swap');

:root{
  --paper:#F6F1E6;
  --paper-dim:#EEE7D6;
  --ink:#2B2A26;
  --ink-soft:#6B6558;
  --sage:#6E8763;
  --sage-dark:#4F6647;
  --rust:#C1622D;
  --line:#D8D0BC;
  --gold:#D9A441;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'DM Sans', sans-serif;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  justify-content:center;
}

html{
  font-size:clamp(14px, 3.6vw, 17px);
}

.app{
  width:100%;
  max-width:clamp(320px, 92vw, 560px);
  min-height:100vh;
  min-height:100dvh;
  background:var(--paper);
  position:relative;
  padding:clamp(18px, 5vw, 32px) clamp(14px, 4.5vw, 24px) clamp(28px, 6vw, 44px);
  padding-top:calc(clamp(18px, 5vw, 32px) + env(safe-area-inset-top));
  padding-bottom:calc(clamp(28px, 6vw, 44px) + env(safe-area-inset-bottom));
  padding-left:calc(clamp(14px, 4.5vw, 24px) + env(safe-area-inset-left));
  padding-right:calc(clamp(14px, 4.5vw, 24px) + env(safe-area-inset-right));
}

header{
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:4px;
  margin-bottom:6px;
}

.brand-mark{
  height:42px;
  width:auto;
  display:block;
}

.sync-btn{
  margin-top:4px;
  font-size:0.6875rem;
  font-family:'DM Sans', sans-serif;
  font-weight:700;
  letter-spacing:.03em;
  color:var(--ink-soft);
  background:var(--paper-dim);
  border:1px solid var(--line);
  border-radius:999px;
  padding:5px 12px;
  cursor:pointer;
}
.sync-btn.connected{
  color:var(--sage-dark);
  background:rgba(110,135,99,0.12);
  border-color:var(--sage);
}
.sync-btn.error{
  color:var(--rust);
  background:rgba(193,98,45,0.1);
  border-color:var(--rust);
}

h1{
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size:2rem;
  margin:0;
  letter-spacing:-0.5px;
}

.tagline{
  font-size:0.8125rem;
  color:var(--ink-soft);
  margin:0 0 22px;
  font-style:italic;
  font-family:'Fraunces', serif;
}

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:20px;
}
.tab-btn{
  flex:1;
  padding:10px 0;
  border:1px solid var(--line);
  background:transparent;
  border-radius:999px;
  font-family:'DM Sans', sans-serif;
  font-weight:700;
  font-size:0.8125rem;
  color:var(--ink-soft);
  cursor:pointer;
  transition:all .15s ease;
}
.tab-btn.active{
  background:var(--ink);
  color:var(--paper);
  border-color:var(--ink);
}

/* ---- Main list view ---- */
.add-row{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}
#itemInput{
  flex:1;
  padding:12px 14px;
  border:1px solid var(--line);
  border-radius:10px;
  font-size:0.9375rem;
  font-family:'DM Sans', sans-serif;
  background:#fff;
  color:var(--ink);
}
#itemInput:focus{outline:none; border-color:var(--sage);}

#aisleSelect{
  padding:12px 10px;
  border:1px solid var(--line);
  border-radius:10px;
  font-size:0.8125rem;
  font-family:'DM Sans', sans-serif;
  background:#fff;
  color:var(--ink);
  max-width:130px;
}

#addBtn{
  padding:0 18px;
  border:none;
  border-radius:10px;
  background:var(--sage);
  color:#fff;
  font-weight:700;
  font-size:1.25rem;
  cursor:pointer;
  line-height:1;
}
#addBtn:active{background:var(--sage-dark);}

.hint{
  font-size:0.75rem;
  color:var(--ink-soft);
  margin:0 0 18px;
}

.aisle-group{
  margin-bottom:20px;
}
.aisle-heading{
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size:1rem;
  color:var(--sage-dark);
  margin:0 0 6px;
  padding-bottom:6px;
  border-bottom:2px solid var(--sage);
  display:flex;
  align-items:center;
  gap:8px;
}

.catalog-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:11px 2px;
  border-bottom:1px dashed var(--line);
}
.catalog-left{
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
  cursor:pointer;
}
.checkbox{
  width:1.5rem;
  height:1.5rem;
  min-width:1.5rem;
  border-radius:7px;
  border:2px solid var(--sage);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .15s ease;
}
.checkbox svg{
  width:14px;
  height:14px;
  opacity:0;
  transition:opacity .1s ease;
}
.catalog-item.selected .checkbox{background:var(--sage);}
.catalog-item.selected .checkbox svg{opacity:1;}
.catalog-item .name{font-size:0.9375rem;}
.catalog-item.selected .name{color:var(--sage-dark); font-weight:700;}
.aisle-tag{
  font-size:0.625rem;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--sage-dark);
  background:rgba(110,135,99,0.12);
  padding:3px 8px;
  border-radius:999px;
  margin-left:8px;
}
.qty{
  font-size:0.75rem;
  color:var(--ink-soft);
  margin-left:6px;
  font-weight:700;
}

.remove-btn{
  background:none;
  border:none;
  color:var(--rust);
  font-size:1rem;
  cursor:pointer;
  padding:4px 8px;
  opacity:.55;
}

.empty-state{
  text-align:center;
  padding:50px 20px;
  color:var(--ink-soft);
}
.empty-state .big{
  font-family:'Fraunces', serif;
  font-size:1.25rem;
  color:var(--ink);
  margin-bottom:6px;
}

.go-shop-wrap{
  position:sticky;
  bottom:calc(16px + env(safe-area-inset-bottom));
  margin-top:24px;
}
.go-shop-btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:var(--rust);
  color:#fff;
  font-weight:700;
  font-size:0.9375rem;
  font-family:'DM Sans', sans-serif;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(193,98,45,0.3);
}
.go-shop-btn:disabled{
  background:var(--line);
  color:var(--ink-soft);
  box-shadow:none;
  cursor:not-allowed;
}

/* ---- Shop view ---- */
.progress-wrap{
  margin-bottom:22px;
}
.progress-label{
  display:flex;
  justify-content:space-between;
  font-size:0.75rem;
  color:var(--ink-soft);
  margin-bottom:6px;
  font-weight:700;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.progress-track{
  height:8px;
  background:var(--paper-dim);
  border-radius:99px;
  overflow:hidden;
  border:1px solid var(--line);
}
.progress-fill{
  height:100%;
  background:var(--sage);
  border-radius:99px;
  transition:width .25s ease;
  width:0%;
}

.shop-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 4px;
  border-bottom:1px dashed var(--line);
  cursor:pointer;
  user-select:none;
}
.shop-item.checked .checkbox{background:var(--sage);}
.shop-item.checked .checkbox svg{opacity:1;}
.shop-item.checked .name{
  color:var(--ink-soft);
  text-decoration:line-through;
  text-decoration-color:var(--rust);
}
.shop-item .name{font-size:0.9688rem; transition:color .15s ease;}

.footer-actions{
  display:flex;
  gap:10px;
  margin-top:28px;
}
.ghost-btn{
  flex:1;
  padding:13px;
  border:1px solid var(--line);
  background:transparent;
  border-radius:12px;
  font-weight:700;
  font-size:0.8125rem;
  color:var(--ink-soft);
  cursor:pointer;
  font-family:'DM Sans', sans-serif;
}

.done-banner{
  text-align:center;
  padding:26px 16px;
  background:rgba(110,135,99,0.12);
  border-radius:14px;
  margin-bottom:20px;
}
.done-banner .big{
  font-family:'Fraunces', serif;
  font-size:1.25rem;
  color:var(--sage-dark);
}

.hidden{display:none !important;}

.add-product-btn{
  width:100%;
  padding:14px;
  border:2px dashed var(--sage);
  background:rgba(110,135,99,0.08);
  border-radius:12px;
  color:var(--sage-dark);
  font-weight:700;
  font-size:0.9375rem;
  font-family:'DM Sans', sans-serif;
  cursor:pointer;
  margin-bottom:16px;
}

.form-field{
  margin-bottom:16px;
}
.form-field label{
  display:block;
  font-size:0.75rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--ink-soft);
  margin-bottom:6px;
}
.form-field input,
.form-field select{
  width:100%;
  padding:12px 14px;
  border:1px solid var(--line);
  border-radius:10px;
  font-size:0.9375rem;
  font-family:'DM Sans', sans-serif;
  background:#fff;
  color:var(--ink);
}
.form-field input:focus,
.form-field select:focus{outline:none; border-color:var(--sage);}

.form-row{
  display:flex;
  gap:12px;
}

.store-toggle{
  display:flex;
  gap:8px;
}
.store-opt{
  flex:1;
  padding:12px 4px;
  border:1px solid var(--line);
  background:#fff;
  border-radius:10px;
  font-family:'DM Sans', sans-serif;
  font-weight:700;
  font-size:0.8125rem;
  color:var(--ink-soft);
  cursor:pointer;
}
.store-opt.selected[data-store="Aldi"]{ background:var(--gold); border-color:var(--gold); color:#fff; }
.store-opt.selected[data-store="Coles"]{ background:var(--rust); border-color:var(--rust); color:#fff; }
.store-opt.selected[data-store="Woolworths"]{ background:var(--sage); border-color:var(--sage); color:#fff; }

.item-meta{
  display:flex;
  align-items:center;
  gap:6px;
  margin-top:3px;
  flex-wrap:wrap;
}
.store-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:20px;
  height:20px;
  border-radius:50%;
  font-size:0.625rem;
  font-weight:700;
  color:#fff;
  flex-shrink:0;
}
.store-badge[data-store="Aldi"]{ background:var(--gold); }
.store-badge[data-store="Coles"]{ background:var(--rust); }
.store-badge[data-store="Woolworths"]{ background:var(--sage); }
.price-tag{
  font-size:0.75rem;
  color:var(--ink-soft);
  font-weight:700;
}
</style>
</head>

    <h1>Shopping List</h1>
    <button id="syncBtn" class="sync-btn">⚙ Not connected</button>
  </header>
  <p class="tagline">tick it, shop it</p>

  <div class="tabs">
    <button class="tab-btn active" id="tabMain">Main List</button>
    <button class="tab-btn" id="tabShop">Shop</button>
  </div>

  <!-- MAIN LIST VIEW -->
  <div id="mainView">
    <button id="openAddBtn" class="add-product-btn">+ Add Product</button>
    <p class="hint">Tap any item below to add or remove it from this week's run.</p>

    <div id="catalogWrap"></div>

    <div id="emptyState" class="empty-state hidden">
      <div class="big">Your main list is empty</div>
      <div>Tap "Add Product" above to get started.</div>
    </div>

    <div class="go-shop-wrap">
      <button class="go-shop-btn" id="goShopBtn" disabled>Start Shopping →</button>
    </div>
  </div>

  <!-- ADD PRODUCT VIEW -->
  <div id="addView" class="hidden">
    <div class="form-field">
      <label>Item name</label>
      <input type="text" id="itemInput" placeholder="e.g. Bananas" autocomplete="off">
    </div>

    <div class="form-field">
      <label>Aisle</label>
      <select id="aisleSelect"></select>
    </div>

    <div class="form-field">
      <label>Store</label>
      <div class="store-toggle" id="storeToggle">
        <button type="button" class="store-opt" data-store="Aldi">Aldi</button>
        <button type="button" class="store-opt" data-store="Coles">Coles</button>
        <button type="button" class="store-opt" data-store="Woolworths">Woolworths</button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-field" style="flex:1;">
        <label>Price ($)</label>
        <input type="number" id="priceInput" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
      </div>
      <div class="form-field" style="width:90px;">
        <label>Qty</label>
        <input type="number" id="qtyInput" value="1" min="1" step="1" inputmode="numeric">
      </div>
    </div>

    <div class="footer-actions">
      <button class="ghost-btn" id="cancelAddBtn">Cancel</button>
      <button class="go-shop-btn" id="saveProductBtn" style="flex:1;">Save Product</button>
    </div>
  </div>

  <!-- SHOP VIEW -->
  <div id="shopView" class="hidden">
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressText">0 of 0 collected</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div id="doneBanner" class="done-banner hidden">

      <div>Everything's ticked off.</div>
    </div>

    <div id="aisleGroups"></div>

    <div class="footer-actions">
      <button class="ghost-btn" id="backToListBtn">← Edit List</button>
      <button class="ghost-btn" id="newRunBtn">Shop Done</button>
    </div>
  </div>

</div>

  const opt = document.createElement('option');
  opt.value = a; opt.textContent = a;
  aisleSelect.appendChild(opt);

function uid(){ return Math.random().toString(36).slice(2,9); }

// ---- GitHub-backed sync ----
const GH_OWNER = "cdjazman";
const GH_REPO = "Shopping_list";
const GH_PATH = "data/list.json";
const GH_BRANCH = "main";
const TOKEN_KEY = "gh-sync-token";

function getToken(){ return localStorage.getItem(TOKEN_KEY); }

function setSyncStatus(state){
  syncBtn.classList.remove('connected','error');
  if(state==='connected'){ syncBtn.textContent='⚙ Synced'; syncBtn.classList.add('connected'); }
  else if(state==='syncing'){ syncBtn.textContent='⚙ Syncing…'; }
  else if(state==='error'){ syncBtn.textContent='⚙ Sync error'; syncBtn.classList.add('error'); }
  else { syncBtn.textContent='⚙ Not connected'; }
}

async function ghGetFile(){
  const token = getToken();
  const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}?ref=${GH_BRANCH}`, {
    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
  });
  if(res.status===404) return null;
  if(!res.ok) throw new Error('GitHub GET failed: '+res.status);
  return res.json();
}

async function ghPutFile(catalogData, sha){
  const token = getToken();
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(catalogData, null, 2))));
  const body = { message: 'Update shopping list', content, branch: GH_BRANCH };
  if(sha) body.sha = sha;
  const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`, {
    method: 'PUT',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if(!res.ok) throw new Error('GitHub PUT failed: '+res.status);
  return res.json();
}

async function save(){
  // always cache locally first so the UI never depends on network speed
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(catalog)); }catch(e){}

  const token = getToken();
  if(!token) return;
  setSyncStatus('syncing');
  try{
    const existing = await ghGetFile();
    await ghPutFile(catalog, existing ? existing.sha : null);
    setSyncStatus('connected');
  }catch(e){
    console.error('Sync failed', e);
    setSyncStatus('error');
  }
}

async function load(){
  const token = getToken();
  if(token){
    setSyncStatus('syncing');
    try{
      const file = await ghGetFile();
      if(file){
        const decoded = decodeURIComponent(escape(atob(file.content.replace(/\n/g,''))));
        catalog = JSON.parse(decoded);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(catalog));
        setSyncStatus('connected');
      }else{
        // no file yet in the repo — seed defaults and create it
        catalog = DEFAULT_ITEMS.map(([name,aisle,qty,store,price])=>({id:uid(),name,aisle,qty,store,price,inList:false,checked:false}));
        await save();
      }
    }catch(e){
      console.error('Load from GitHub failed, falling back to local cache', e);
      setSyncStatus('error');
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(raw) catalog = JSON.parse(raw);
      }catch(e2){}
    }
  }else{
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) catalog = JSON.parse(raw);
    }catch(e){ catalog = []; }
    if(catalog.length===0){
      catalog = DEFAULT_ITEMS.map(([name,aisle,qty,store,price])=>({id:uid(),name,aisle,qty,store,price,inList:false,checked:false}));
      await save();
    }
  }
  renderMain();
}

syncBtn.addEventListener('click', async ()=>{
  const current = getToken();
  const token = prompt(
    current
      ? "Update your GitHub token (leave blank and cancel to keep the current one):"
      : "Paste your GitHub personal access token to sync across devices:\n\n(Needs 'Contents: Read and write' access to the Shopping_list repo)"
  );
  if(token === null) return; // cancelled
  if(token.trim()===''){
    localStorage.removeItem(TOKEN_KEY);
    setSyncStatus('idle');
    return;
  }
  localStorage.setItem(TOKEN_KEY, token.trim());
  await load();
});

function addItem(){
  const name = itemInput.value.trim();
  if(!name){ itemInput.focus(); return; }
  const qty = Math.max(1, parseInt(qtyInput.value,10) || 1);
  const price = parseFloat(priceInput.value);
  catalog.push({
    id: uid(),
    name,
    aisle: aisleSelect.value,
    qty,
    store: selectedStore,
    price: isNaN(price) ? null : price,
    inList:false,
    checked:false
  });
  save();
  showMain();
}

function openAddView(){
  itemInput.value='';
  priceInput.value='';
  qtyInput.value='1';
  selectedStore = "Aldi";
  updateStoreToggleUI();
  mainView.classList.add('hidden');
  shopView.classList.add('hidden');
  addView.classList.remove('hidden');
  setTimeout(()=> itemInput.focus(), 50);
}

function updateStoreToggleUI(){
  storeToggle.querySelectorAll('.store-opt').forEach(btn=>{
    btn.classList.toggle('selected', btn.dataset.store===selectedStore);
  });
}

storeToggle.querySelectorAll('.store-opt').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    selectedStore = btn.dataset.store;
    updateStoreToggleUI();
  });
});

const STORE_LETTER = { "Aldi":"A", "Coles":"C", "Woolworths":"W" };
const STORE_CYCLE = ["Aldi","Coles","Woolworths"];

function cycleStore(id){
  const item = catalog.find(i=>i.id===id);
  if(!item) return;
  const idx = STORE_CYCLE.indexOf(item.store);
  item.store = STORE_CYCLE[(idx+1) % STORE_CYCLE.length];
  save();
  renderShop();
}

function removeFromCatalog(id){
  catalog = catalog.filter(i=>i.id!==id);
  save();
  renderMain();
}

function toggleInList(id){
  const item = catalog.find(i=>i.id===id);
  if(!item) return;
  item.inList = !item.inList;
  if(!item.inList) item.checked = false;
  save();
  renderMain();
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderMain(){
  catalogWrap.innerHTML='';
  const selectedCount = catalog.filter(i=>i.inList).length;

  if(catalog.length===0){
    emptyState.classList.remove('hidden');
  }else{
    emptyState.classList.add('hidden');
  }
  goShopBtn.disabled = selectedCount===0;
  goShopBtn.textContent = selectedCount===0 ? "Start Shopping →" : `Start Shopping (${selectedCount}) →`;

  const sorted = [...catalog].sort((a,b)=> a.name.localeCompare(b.name, undefined, {sensitivity:'base'}));

  sorted.forEach(item=>{
    const row = document.createElement('div');
    row.className='catalog-item' + (item.inList ? ' selected':'');
    const priceStr = (item.price!=null && !isNaN(item.price)) ? `<span class="price-tag">$${Number(item.price).toFixed(2)}</span>` : '';
    const storeStr = item.store ? `<span class="store-badge" data-store="${escapeHtml(item.store)}">${STORE_LETTER[item.store]||'?'}</span>` : '';
    row.innerHTML = `
      <div class="catalog-left" data-id="${item.id}">
        <div class="checkbox">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div>
          <span class="name">${escapeHtml(item.name)}${item.qty>1?`<span class="qty">×${item.qty}</span>`:''}</span>
          <div class="item-meta">
            <span class="aisle-tag">${escapeHtml(item.aisle)}</span>
            ${storeStr}
            ${priceStr}
          </div>
        </div>
      </div>
      <button class="remove-btn" data-remove="${item.id}">✕</button>
    `;
    catalogWrap.appendChild(row);
  });

  catalogWrap.querySelectorAll('.catalog-left').forEach(el=>{
    el.addEventListener('click', ()=> toggleInList(el.dataset.id));
  });
  catalogWrap.querySelectorAll('[data-remove]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      removeFromCatalog(btn.dataset.remove);
    });
  });
}

function renderShop(){
  aisleGroups.innerHTML='';
  const active = catalog.filter(i=>i.inList);
  const total = active.length;
  const checkedCount = active.filter(i=>i.checked).length;
  const pct = total===0 ? 0 : Math.round((checkedCount/total)*100);
  progressFill.style.width = pct+'%';
  progressText.textContent = `${checkedCount} of ${total} collected`;
  progressPct.textContent = pct+'%';
  doneBanner.classList.toggle('hidden', !(total>0 && checkedCount===total));

  AISLES.forEach(aisle=>{
    const groupItems = active.filter(i=>i.aisle===aisle).sort((a,b)=> a.name.localeCompare(b.name, undefined, {sensitivity:'base'}));
    if(groupItems.length===0) return;
    const wrap = document.createElement('div');
    wrap.className='aisle-group';
    const collectedInGroup = groupItems.filter(i=>i.checked).length;
    wrap.innerHTML = `<div class="aisle-heading">${escapeHtml(aisle)} <span style="font-family:'DM Sans',sans-serif;font-weight:400;font-size:0.6875rem;color:var(--ink-soft);">(${collectedInGroup}/${groupItems.length})</span></div>`;
    groupItems.forEach(item=>{
      const row = document.createElement('div');
      row.className='shop-item' + (item.checked ? ' checked':'');
      row.dataset.id = item.id;
      const priceStr = (item.price!=null && !isNaN(item.price)) ? `<span class="price-tag">$${Number(item.price).toFixed(2)}</span>` : '';
      const storeStr = item.store ? `<span class="store-badge" data-store="${escapeHtml(item.store)}" data-cyclestore="${item.id}">${STORE_LETTER[item.store]||'?'}</span>` : '';
      row.innerHTML = `
        <div class="checkbox">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div>
          <span class="name">${escapeHtml(item.name)}${item.qty>1?`<span class="qty">×${item.qty}</span>`:''}</span>
          <div class="item-meta">
            ${storeStr}
            ${priceStr}
          </div>
        </div>
      `;
      row.addEventListener('click', (e)=>{
        if(e.target.closest('[data-cyclestore]')){
          e.stopPropagation();
          cycleStore(e.target.closest('[data-cyclestore]').dataset.cyclestore);
          return;
        }
        item.checked = !item.checked;
        save();
        renderShop();
      });
      wrap.appendChild(row);
    });
    aisleGroups.appendChild(wrap);
  });
}

function showMain(){
  mainView.classList.remove('hidden');
  shopView.classList.add('hidden');
  addView.classList.add('hidden');
  tabMain.classList.add('active');
  tabShop.classList.remove('active');
  renderMain();
}
function showShop(){
  mainView.classList.add('hidden');
  shopView.classList.remove('hidden');
  addView.classList.add('hidden');
  tabMain.classList.remove('active');
  tabShop.classList.add('active');
  renderShop();
}

openAddBtn.addEventListener('click', openAddView);
cancelAddBtn.addEventListener('click', showMain);
saveProductBtn.addEventListener('click', addItem);
itemInput.addEventListener('keydown', e=>{ if(e.key==='Enter') addItem(); });
goShopBtn.addEventListener('click', showShop);
backToListBtn.addEventListener('click', showMain);
tabMain.addEventListener('click', showMain);
tabShop.addEventListener('click', ()=>{ if(catalog.some(i=>i.inList)) showShop(); });
newRunBtn.addEventListener('click', async ()=>{
  if(confirm("Reset the list? This will unselect and uncheck everything ready for next time.")){
    catalog.forEach(i=>{ i.inList=false; i.checked=false; });
    await save();
  }
  showMain();
});

load();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
